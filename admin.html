<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Homestay Tokou</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F1117;
    --surface: #1A1D27;
    --surface2: #22253A;
    --border: rgba(255,255,255,.08);
    --gold: #D4A853;
    --gold-dim: rgba(212,168,83,.15);
    --cream: #F5EFE0;
    --text: #E8E4DC;
    --text-dim: rgba(232,228,220,.5);
    --green: #4CAF7D;
    --red: #E05252;
    --blue: #5B8EE0;
    --shadow: rgba(0,0,0,.4);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── LAYOUT ── */
  .admin-layout { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 2rem 0;
    position: sticky; top: 0; height: 100vh;
    display: flex; flex-direction: column;
  }
  .sidebar-logo {
    padding: 0 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.5rem;
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem; color: var(--cream);
  }
  .sidebar-logo span { color: var(--gold); }
  .sidebar-logo p { font-size: .75rem; color: var(--text-dim); font-family: 'Outfit', sans-serif; font-weight: 400; margin-top: .2rem; }

  .sidebar-nav { list-style: none; padding: 0 .75rem; flex: 1; }
  .sidebar-nav li { margin-bottom: .25rem; }
  .sidebar-nav a {
    display: flex; align-items: center; gap: .75rem;
    padding: .65rem 1rem; border-radius: 4px;
    color: var(--text-dim); text-decoration: none; font-size: .9rem;
    transition: background .15s, color .15s;
  }
  .sidebar-nav a:hover, .sidebar-nav a.active {
    background: var(--gold-dim); color: var(--gold);
  }
  .sidebar-nav .icon { font-size: 1.1rem; width: 20px; text-align: center; }

  .sidebar-footer {
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border);
    font-size: .8rem; color: var(--text-dim);
  }
  .sidebar-footer a { color: var(--gold); text-decoration: none; }

  /* ── MAIN ── */
  .main { overflow-y: auto; }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.2rem 2.5rem;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 10;
  }
  .topbar h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; }
  .topbar-meta { font-size: .82rem; color: var(--text-dim); }

  .content { padding: 2.5rem; }

  /* ── STATS ── */
  .stats-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 1.25rem; margin-bottom: 2.5rem;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 1.5rem;
    position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--gold);
  }
  .stat-label {
    font-size: .72rem; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: .6rem;
  }
  .stat-val {
    font-family: 'Playfair Display', serif;
    font-size: 2rem; color: var(--cream); line-height: 1;
    margin-bottom: .2rem;
  }
  .stat-sub { font-size: .8rem; color: var(--text-dim); }
  .stat-icon { position: absolute; top: 1.2rem; right: 1.2rem; font-size: 1.8rem; opacity: .25; }

  /* ── TABLES ── */
  .section-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden; margin-bottom: 2rem;
  }
  .section-card-header {
    padding: 1.2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .section-card-header h2 {
    font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--cream);
  }
  .section-card-header p { font-size: .8rem; color: var(--text-dim); }

  table { width: 100%; border-collapse: collapse; }
  th {
    padding: .8rem 1.5rem;
    text-align: left; font-size: .7rem; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  td {
    padding: .9rem 1.5rem; font-size: .88rem;
    border-bottom: 1px solid var(--border); color: var(--text);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }

  .badge {
    display: inline-block; padding: .2rem .65rem; border-radius: 20px;
    font-size: .72rem; font-weight: 600; letter-spacing: .5px;
  }
  .badge-confirmed { background: rgba(76,175,125,.15); color: var(--green); }
  .badge-cancelled { background: rgba(224,82,82,.15); color: var(--red); }
  .badge-pending   { background: rgba(91,142,224,.15); color: var(--blue); }

  .action-btn {
    background: none; border: 1px solid var(--border);
    color: var(--text-dim); padding: .3rem .7rem; border-radius: 3px;
    cursor: pointer; font-size: .78rem; font-family: 'Outfit', sans-serif;
    transition: all .15s; margin-right: .3rem;
  }
  .action-btn:hover { border-color: var(--gold); color: var(--gold); }
  .action-btn.danger:hover { border-color: var(--red); color: var(--red); }

  /* ── SEARCH BAR ── */
  .search-bar {
    display: flex; gap: .75rem; margin-bottom: 1.5rem;
  }
  .search-bar input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: .65rem 1rem; border-radius: 4px;
    font-family: 'Outfit', sans-serif; font-size: .9rem; outline: none;
    transition: border-color .2s;
  }
  .search-bar input:focus { border-color: var(--gold); }
  .search-bar select {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: .65rem 1rem; border-radius: 4px;
    font-family: 'Outfit', sans-serif; font-size: .9rem; outline: none;
  }

  /* ── EMPTY ── */
  .empty { text-align: center; padding: 3rem; color: var(--text-dim); font-size: .9rem; }

  /* ── SPINNER ── */
  .spinner {
    width: 36px; height: 36px; border-radius: 50%;
    border: 3px solid var(--border); border-top-color: var(--gold);
    animation: spin .8s linear infinite; margin: 2rem auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    background: var(--surface2); color: var(--text);
    padding: .9rem 1.3rem; border-radius: 4px; z-index: 999;
    border-left: 3px solid var(--gold); font-size: .88rem;
    box-shadow: 0 8px 30px var(--shadow);
    transform: translateY(100px); opacity: 0;
    transition: transform .3s, opacity .3s; max-width: 320px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-color: var(--red); }
  .toast.success { border-color: var(--green); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
    display: none; place-items: center;
  }
  .modal-overlay.open { display: grid; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; width: 100%; max-width: 480px;
    padding: 2rem; animation: mIn .2s ease;
  }
  @keyframes mIn { from { opacity:0; transform:scale(.96); } to { opacity:1; transform:scale(1); } }
  .modal h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 1.2rem; color: var(--cream); }
  .modal .detail-row { display: flex; justify-content: space-between; padding: .5rem 0; border-bottom: 1px solid var(--border); font-size: .9rem; }
  .modal .detail-row:last-of-type { border-bottom: none; }
  .modal .key { color: var(--text-dim); }
  .modal-btns { display: flex; gap: .75rem; margin-top: 1.5rem; justify-content: flex-end; }
  .btn { padding: .65rem 1.3rem; border-radius: 3px; cursor: pointer; font-family: 'Outfit', sans-serif; font-size: .88rem; font-weight: 500; border: none; transition: opacity .15s; }
  .btn-gold { background: var(--gold); color: #1a1000; }
  .btn-red  { background: rgba(224,82,82,.15); color: var(--red); border: 1px solid rgba(224,82,82,.3); }
  .btn-ghost { background: none; border: 1px solid var(--border); color: var(--text-dim); }
  .btn:hover { opacity: .85; }

  @media (max-width: 900px) {
    .admin-layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="admin-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      Tokou<span>.</span>
      <p>Admin Dashboard</p>
    </div>
    <ul class="sidebar-nav">
      <li><a href="#" class="active" onclick="showSection('overview')"><span class="icon">📊</span> Overview</a></li>
      <li><a href="#" onclick="showSection('rooms')"><span class="icon">🏡</span> Rooms</a></li>
      <li><a href="#" onclick="showSection('reviews')"><span class="icon">⭐</span> Reviews</a></li>
    </ul>
    <div class="sidebar-footer">
      <a href="/">← Back to Website</a><br>
      <span style="margin-top:.5rem;display:block">Homestay Tokou © 2025</span>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <h1 id="page-title">Overview</h1>
      <span class="topbar-meta" id="topbar-meta">Loading…</span>
    </div>

    <div class="content">

      <!-- OVERVIEW -->
      <div id="section-overview">
        <div class="stats-grid" id="stats-grid">
          <div style="grid-column:1/-1;text-align:center"><div class="spinner"></div></div>
        </div>
      </div>



      <!-- ROOMS -->
      <div id="section-rooms" style="display:none">
        <div class="section-card">
          <div class="section-card-header">
            <div><h2>Room Inventory</h2><p>All available rooms</p></div>
          </div>
          <div id="rooms-table"></div>
        </div>
      </div>

      <!-- REVIEWS -->
      <div id="section-reviews" style="display:none">
        <div class="section-card">
          <div class="section-card-header">
            <div><h2>Guest Reviews</h2><p id="reviews-meta">Loading…</p></div>
          </div>
          <div id="reviews-table"></div>
        </div>
      </div>

    </div><!-- /content -->
  </main>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const API = '';
let allRooms = [];

// ── Utils ────────────────────────────────────────────────────────────────────
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => t.className = 'toast', 3200);
}

function fmtDate(s) {
  return new Date(s + 'T00:00:00').toLocaleDateString('en-MY', { day:'numeric', month:'short', year:'numeric' });
}

function fmtMoney(v) { return 'RM ' + Number(v).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

function badgeHtml(status) {
  return `<span class="badge badge-${status}">${status.toUpperCase()}</span>`;
}

// ── Sections ─────────────────────────────────────────────────────────────────
const sections = ['overview','rooms','reviews'];
const titles   = { overview:'Overview', rooms:'Rooms', reviews:'Reviews' };

function showSection(name) {
  sections.forEach(s => {
    document.getElementById('section-' + s).style.display = (s === name) ? '' : 'none';
  });
  document.getElementById('page-title').textContent = titles[name];
  document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
  document.querySelectorAll('.sidebar-nav a').forEach(a => {
    if (a.textContent.trim().toLowerCase().includes(name)) a.classList.add('active');
  });
  if (name === 'rooms')    loadRooms();
  if (name === 'reviews')  loadReviews();
}

// ── Overview ──────────────────────────────────────────────────────────────────
async function loadDashboard() {
  try {
    const res  = await fetch(`${API}/api/dashboard`);
    const data = await res.json();

    document.getElementById('topbar-meta').textContent = new Date().toLocaleDateString('en-MY', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card">
        <div class="stat-icon">🏡</div>
        <p class="stat-label">Rooms</p>
        <div class="stat-val">${data.total_rooms}</div>
        <p class="stat-sub">Room types available</p>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⭐</div>
        <p class="stat-label">Avg Rating</p>
        <div class="stat-val">${data.avg_rating}</div>
        <p class="stat-sub">Out of 5 stars</p>
      </div>`;


  } catch(e) {
    document.getElementById('stats-grid').innerHTML = `<p style="color:var(--red);grid-column:1/-1;text-align:center">Failed to load dashboard data.</p>`;
  }
}



// ── Rooms ────────────────────────────────────────────────────────────────────
async function loadRooms() {
  document.getElementById('rooms-table').innerHTML = `<div class="spinner"></div>`;
  try {
    const res   = await fetch(`${API}/api/rooms`);
    allRooms = await res.json();
    document.getElementById('rooms-table').innerHTML = `
      <table>
        <thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Price/Night</th><th>Capacity</th><th>Amenities</th></tr></thead>
        <tbody>
          ${allRooms.map(r => `
          <tr>
            <td style="color:var(--text-dim)">#${r.id}</td>
            <td><strong>${r.name}</strong></td>
            <td><span class="badge" style="background:var(--gold-dim);color:var(--gold)">${r.type}</span></td>
            <td>${fmtMoney(r.price)}</td>
            <td>${r.capacity} guests</td>
            <td style="font-size:.8rem;color:var(--text-dim)">${(Array.isArray(r.amenities) ? r.amenities : []).join(', ')}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  } catch(e) {
    document.getElementById('rooms-table').innerHTML = `<div class="empty">Failed to load rooms.</div>`;
  }
}

// ── Reviews ───────────────────────────────────────────────────────────────────
async function loadReviews() {
  document.getElementById('reviews-table').innerHTML = `<div class="spinner"></div>`;
  try {
    const res  = await fetch(`${API}/api/reviews`);
    const data = await res.json();
    document.getElementById('reviews-meta').textContent = `${data.reviews.length} reviews · Avg: ${data.average_rating} ★`;
    document.getElementById('reviews-table').innerHTML = `
      <table>
        <thead><tr><th>Guest</th><th>Rating</th><th>Comment</th><th>Date</th></tr></thead>
        <tbody>
          ${data.reviews.map(r => `
          <tr>
            <td>${r.guest_name}</td>
            <td><span style="color:var(--gold)">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span></td>
            <td style="font-size:.88rem;max-width:360px">${r.comment || '—'}</td>
            <td style="color:var(--text-dim);font-size:.82rem">${new Date(r.created_at).toLocaleDateString('en-MY')}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  } catch(e) {
    document.getElementById('reviews-table').innerHTML = `<div class="empty">Failed to load reviews.</div>`;
  }
}



// ── Init ─────────────────────────────────────────────────────────────────────
loadDashboard();
</script>
</body>
</html>
