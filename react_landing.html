<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokou — Experience the Outskirts</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <!-- HLS.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- React & Babel for single-file demo -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --primary: #d4a853;
            --white: #ffffff;
            --bg-overlay: rgba(0, 0, 0, 0.4);
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background: #000;
            color: var(--white);
        }

        /* --- VIDEO BACKGROUND --- */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.8) contrast(1.1);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.3) 0%,
                rgba(0,0,0,0) 50%,
                rgba(0,0,0,0.6) 100%
            );
            z-index: -1;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1200px;
            padding: 1.2rem 2.5rem;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            animation: slideDown 1s ease both;
        }

        @keyframes slideDown {
            from { transform: translate(-50%, -100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .logo span { color: var(--primary); }

        .nav-links {
            display: flex;
            gap: 3rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--white);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
            transition: opacity 0.3s, transform 0.3s;
        }

        .nav-links a:hover {
            opacity: 1;
            transform: translateY(-1px);
        }

        .cta-btn {
            background: var(--white);
            color: #000;
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .cta-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(255,255,255,0.2);
        }

        /* --- HERO CONTENT --- */
        .hero {
            position: absolute;
            bottom: 6rem;
            left: 6rem;
            max-width: 600px;
            z-index: 10;
            animation: fadeInUp 1.2s ease both 0.5s;
        }

        @keyframes fadeInUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3.5rem, 8vw, 5.5rem);
            line-height: 1;
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        .hero p {
            font-size: 1.1rem;
            line-height: 1.8;
            opacity: 0.9;
            margin-bottom: 2.5rem;
            font-weight: 300;
            max-width: 480px;
            border-left: 2px solid var(--primary);
            padding-left: 1.5rem;
        }

        .hero-actions {
            display: flex;
            gap: 1.5rem;
        }

        .explore-btn {
            background: var(--primary);
            color: #fff;
            padding: 1.2rem 2.8rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            font-size: 1rem;
            transition: background 0.3s, transform 0.3s;
        }

        .explore-btn:hover {
            background: #b88e3d;
            transform: translateY(-3px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero { left: 2rem; bottom: 4rem; padding-right: 2rem; }
            nav { padding: 1rem 1.5rem; width: 95%; }
            .nav-links { display: none; }
            .hero h1 { font-size: 3.5rem; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const videoRef = useRef(null);
            const [videoStatus, setVideoStatus] = useState('loading');

            useEffect(() => {
                const video = videoRef.current;
                // High-quality atmospheric HLS stream (Landscape/Nature)
                const videoSrc = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';

                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(videoSrc);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        video.play();
                        setVideoStatus('playing');
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = videoSrc;
                    video.addEventListener('loadedmetadata', () => {
                        video.play();
                        setVideoStatus('playing');
                    });
                }
            }, []);

            return (
                <div className="wrapper">
                    <div className="video-container">
                        <video 
                            ref={videoRef} 
                            id="video" 
                            muted 
                            loop 
                            playsInline
                        />
                        <div className="overlay"></div>
                    </div>

                    <nav>
                        <div className="logo">Tokou<span>.</span></div>
                        <ul className="nav-links">
                            <li><a href="#">The Stay</a></li>
                            <li><a href="#">Nature</a></li>
                            <li><a href="#">Culture</a></li>
                            <li><a href="#">Enquiry</a></li>
                        </ul>
                        <a href="#" className="cta-btn">Book Now</a>
                    </nav>

                    <main className="hero">
                        <h1>Beyond the <br/>Horizon.</h1>
                        <p>
                            Escape to the tranquil outskirts of Beluran, where the lush Sabahan wilderness meets 
                            unrivaled traditional hospitality. A retreat for the soul, a journey for the senses.
                        </p>
                        <div className="hero-actions">
                            <a href="#" className="explore-btn">Discover More</a>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
