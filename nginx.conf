# ════════════════════════════════════════════════════════
# Nginx Configuration — Rumah Alam Homestay
# Place this file at: /etc/nginx/sites-available/rumahalam
# Then: sudo ln -s /etc/nginx/sites-available/rumahalam /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
# ════════════════════════════════════════════════════════

server {
    listen 80;
    server_name rumahalam.my www.rumahalam.my;

    # Redirect HTTP → HTTPS (uncomment after SSL setup)
    # return 301 https://$host$request_uri;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Static files served directly by Nginx (much faster)
    location /static/ {
        alias /var/www/rumahalam/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # All other requests → FastAPI/uvicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy       "strict-origin" always;

    # Max upload size
    client_max_body_size 10M;
}

